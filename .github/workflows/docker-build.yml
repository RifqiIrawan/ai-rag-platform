name: Docker Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - document-service
          - ocr-service
          - embedding-service
          - rag-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: ai-rag-platform/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
