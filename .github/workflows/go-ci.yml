name: Go CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - document-service
          - rag-service
          - notification-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - run: go mod download

      - run: go vet ./...

      - name: gofmt check
        run: test -z "$(gofmt -l .)"

      - run: go test ./... -v -cover

      - run: go build -o /tmp/${{ matrix.service }} ./cmd/server
